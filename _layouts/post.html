<article class="post">

</article>
<script>
  // Links externos dentro do post abrem em nova aba (ex.: citação do autor no GitHub)
  document.querySelectorAll('.post a[href^="http"]').forEach(function (a) {
    if (a.host !== location.host) { a.target = "_blank"; a.rel = "noopener noreferrer"; }
  });
</script>

</aside>
