<svg width="1100" height="620" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Benchmark CNPJ Python vs Rust">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#1a2438"/>
    </linearGradient>
    <linearGradient id="py" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd95a"/>
      <stop offset="100%" stop-color="#ffbd2e"/>
    </linearGradient>
    <linearGradient id="rs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9af07d"/>
      <stop offset="100%" stop-color="#4ecb71"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Fira Sans', 'DejaVu Sans', sans-serif; fill: #eef3ff; }
      .subtitle { font: 500 18px 'Fira Sans', 'DejaVu Sans', sans-serif; fill: #b8c4e6; }
      .axis { font: 600 15px 'Fira Sans', 'DejaVu Sans', sans-serif; fill: #cdd7f2; }
      .label { font: 600 16px 'Fira Sans', 'DejaVu Sans', sans-serif; fill: #f4f7ff; }
      .small { font: 500 14px 'Fira Sans', 'DejaVu Sans', sans-serif; fill: #c8d3f0; }
      .value { font: 700 20px 'Fira Sans', 'DejaVu Sans', sans-serif; fill: #ffffff; }
      .note { font: 600 22px 'Fira Sans', 'DejaVu Sans', sans-serif; fill: #9af07d; }
      .grid { stroke: #30405f; stroke-width: 1; stroke-dasharray: 5 6; }
      .panel { fill: #121c2f; stroke: #2e3f60; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="620" fill="url(#bg)"/>
  <text x="56" y="58" class="title">Benchmark: Valida&#231;&#227;o de CNPJ em Python vs Rust (PyO3)</text>
  <text x="56" y="90" class="subtitle">Lote de 100.000 valida&#231;&#245;es mistas (num&#233;rico + alfanum&#233;rico)</text>

  <rect x="54" y="122" width="480" height="440" rx="14" class="panel"/>
  <text x="78" y="160" class="label">Tempo total (segundos, menor e melhor)</text>

  <line x1="90" y1="510" x2="500" y2="510" class="grid"/>
  <line x1="90" y1="430" x2="500" y2="430" class="grid"/>
  <line x1="90" y1="350" x2="500" y2="350" class="grid"/>
  <line x1="90" y1="270" x2="500" y2="270" class="grid"/>
  <line x1="90" y1="190" x2="500" y2="190" class="grid"/>

  <text x="64" y="515" class="axis">0.0</text>
  <text x="64" y="435" class="axis">0.1</text>
  <text x="64" y="355" class="axis">0.2</text>
  <text x="64" y="275" class="axis">0.3</text>
  <text x="64" y="195" class="axis">0.4</text>

  <rect x="150" y="130" width="120" height="380" rx="10" fill="url(#py)"/>
  <rect x="320" y="495" width="120" height="15" rx="10" fill="url(#rs)"/>

  <text x="152" y="530" class="label">Python</text>
  <text x="340" y="530" class="label">Rust</text>

  <text x="168" y="120" class="value">0.475s</text>
  <text x="340" y="488" class="value">0.019s</text>

  <rect x="564" y="122" width="480" height="440" rx="14" class="panel"/>
  <text x="588" y="160" class="label">Throughput (valida&#231;&#245;es por segundo, maior &#233; melhor)</text>

  <line x1="600" y1="510" x2="1010" y2="510" class="grid"/>
  <line x1="600" y1="430" x2="1010" y2="430" class="grid"/>
  <line x1="600" y1="350" x2="1010" y2="350" class="grid"/>
  <line x1="600" y1="270" x2="1010" y2="270" class="grid"/>
  <line x1="600" y1="190" x2="1010" y2="190" class="grid"/>

  <text x="562" y="515" class="axis">0M</text>
  <text x="550" y="435" class="axis">1.3M</text>
  <text x="550" y="355" class="axis">2.6M</text>
  <text x="550" y="275" class="axis">3.9M</text>
  <text x="550" y="195" class="axis">5.2M</text>

  <rect x="660" y="495" width="120" height="15" rx="10" fill="url(#py)"/>
  <rect x="830" y="190" width="120" height="320" rx="10" fill="url(#rs)"/>

  <text x="662" y="530" class="label">Python</text>
  <text x="850" y="530" class="label">Rust</text>

  <text x="658" y="488" class="value">210k/s</text>
  <text x="848" y="182" class="value">5.25M/s</text>

  <text x="56" y="594" class="note">Ganho observado: ~25x no hot path de valida&#231;&#227;o</text>
</svg>
