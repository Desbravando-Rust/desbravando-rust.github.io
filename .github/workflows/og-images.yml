name: Verifica imagens OG

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-og-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build do site (Jekyll)
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Verifica que todo og:image existe no build
        run: python3 scripts/check_og_images.py ./_site
